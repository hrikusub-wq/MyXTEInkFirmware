; Xteink X3 カスタムファームウェア
; MCU: ESP32-C3 (RISC-V シングルコア) / Flash 16MB / RAM 約380KB
; ディスプレイ: E-ink 792x528 (SSD1677系, open-x4-sdkのEInkDisplayでX3モード使用)

[env:xteink-x3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; X3実機はFlash 16MB
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; X3のフラッシュチップ配線はQIO非対応の可能性が高く(ボードデフォルトはqio/80MHz)、
; DIOモード起動時に2次ブートローダーがパーティションテーブルを読めない不具合が発生したため、
; 安全なDIO/40MHzに固定する
board_build.flash_mode = dio
board_build.f_flash = 40000000L

; ESP32-C3内蔵のUSB Serial/JTAGをArduinoのSerialに割り当てる
; (X3はGPIO18/19が直接USBコネクタに配線されている)
;
; SdFatはデフォルトでUSE_UTF8_LONG_NAMES=0のため、長いファイル名(LFN)の非ASCII
; 文字(日本語など)がFsFile::getName()の時点で全て'?'に置き換えられてしまう
; (フォント描画側の豆腐グリフとは別問題で、文字列自体が壊れる)。SdFatConfig.hの
; コメントにある通りビルドフラグで上書きして有効化する。
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_UTF8_LONG_NAMES=1

monitor_speed = 115200

; ハードウェア抽象化層: open-x4-sdk (ローカルクローン) から必要なものだけ使う
lib_deps =
    EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
    InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
    SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
    ; X3のバッテリー(BQ27220フューエルゲージ、I2C 0x55)用ドライバ。
    ; open-x4-sdkのBatteryMonitorはX4のADC分圧方式専用で使えないため別途追加。
    https://github.com/kodediy/kode_BQ27220.git
    ; BLEファイル転送・クラウド同期機能用(2.x系のNimBLEConnInfo付きコールバック
    ; シグネチャ前提で実装しているため、1.x系では動かないので注意)。
    h2zero/NimBLE-Arduino@^2.1.0
    ; 待機画面のJPEG表示用。コールバックベースでMCUブロック単位にデコードでき、
    ; フル展開バッファを持たずに済むためESP32-C3のRAM制約に適する(StandbyScreen参照)。
    bitbank2/JPEGDEC@^1.8.2
