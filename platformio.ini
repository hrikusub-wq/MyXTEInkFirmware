; Xteink X3 カスタムファームウェア
; MCU: ESP32-C3 (RISC-V シングルコア) / Flash 16MB / RAM 約380KB
; ディスプレイ: E-ink 792x528 (SSD1677系, open-x4-sdkのEInkDisplayでX3モード使用)

[env:xteink-x3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; X3実機はFlash 16MB
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; X3のフラッシュチップ配線はQIO非対応の可能性が高く(ボードデフォルトはqio/80MHz)、
; DIOモード起動時に2次ブートローダーがパーティションテーブルを読めない不具合が発生したため、
; 安全なDIO/40MHzに固定する
board_build.flash_mode = dio
board_build.f_flash = 40000000L

; ESP32-C3内蔵のUSB Serial/JTAGをArduinoのSerialに割り当てる
; (X3はGPIO18/19が直接USBコネクタに配線されている)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200

; ハードウェア抽象化層: open-x4-sdk (ローカルクローン) から必要なものだけ使う
lib_deps =
    EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
    InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
    SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
